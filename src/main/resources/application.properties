# ==============================================
# ONLINE EXAM PORTAL — Application Configuration
# ==============================================

# ---- Server ----
server.port=8080

# ---- MySQL Database ----
# Automatically detects Railway variables or falls back to local settings
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:exam_portal_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Thymeleaf ----
spring.thymeleaf.cache=false

# ---- Session ----
server.servlet.session.timeout=60m

# ---- Default Admin Account (seeded on first run) ----
app.admin.email=admin@examportal.com
app.admin.password=Admin@123
app.admin.firstname=System
app.admin.lastname=Administrator
