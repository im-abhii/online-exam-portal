<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Exam Results - ExamPortal</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">All Results</h2>
            <div>
                <a th:href="@{/admin/export/csv}" class="btn btn-outline-success me-2">
                    <i class="bi bi-filetype-csv me-1"></i> Export CSV
                </a>
                <a th:href="@{/admin/export/pdf}" class="btn btn-outline-danger">
                    <i class="bi bi-filetype-pdf me-1"></i> Export PDF
                </a>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="ps-4">Student Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Exam Title</th>
                                <th scope="col">Score</th>
                                <th scope="col">Percentage</th>
                                <th scope="col">Status</th>
                                <th scope="col">Auto-Submit</th>
                                <th scope="col" class="text-end pe-4">Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${attempts.empty}">
                                <td colspan="8" class="text-center py-4 text-muted">
                                    <i class="bi bi-clipboard-data fs-2 d-block mb-2"></i>
                                    No completed exam results yet.
                                </td>
                            </tr>
                            <tr th:each="attempt : ${attempts}">
                                <td class="ps-4 fw-medium" th:text="${attempt.user.firstName + ' ' + attempt.user.lastName}">John Doe</td>
                                <td th:text="${attempt.user.email}">john@example.com</td>
                                <td th:text="${attempt.exam.title}">Java Basics</td>
                                <td><span th:text="${attempt.score}">15</span> / <span th:text="${attempt.totalMarks}">20</span></td>
                                <td><span th:text="${#numbers.formatDecimal(attempt.percentage, 1, 1)}">75.0</span>%</td>
                                <td>
                                    <span class="badge" th:classappend="${attempt.passed ? 'bg-success' : 'bg-danger'}" 
                                          th:text="${attempt.passed ? 'PASSED' : 'FAILED'}">PASSED</span>
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:if="${attempt.autoSubmitted}">Yes</span>
                                    <span class="badge bg-light text-dark" th:unless="${attempt.autoSubmitted}">No</span>
                                </td>
                                <td class="text-end pe-4 text-muted small" th:text="${#temporals.format(attempt.endTime, 'MMM dd, yyyy HH:mm')}">
                                    Jan 1, 2024 10:00
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
