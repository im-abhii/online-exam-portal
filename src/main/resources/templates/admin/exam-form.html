<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title th:text="${editing ? 'Edit Exam' : 'Create Exam'} + ' — ExamPortal'">Exam Form — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="mb-4">
          <a th:href="@{/admin/exams}" class="text-muted" style="font-size:0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Back to Exams
          </a>
          <h1 class="page-title mt-2" th:text="${editing ? 'Edit Exam' : 'Create New Exam'}">Create Exam</h1>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
          <i class="bi bi-exclamation-circle me-1"></i>
          <span th:text="${error}">Error</span>
        </div>

        <div class="card">
          <div class="card-body">
            <form th:action="@{/admin/exam/save}" method="post" th:object="${exam}">
              <!-- Hidden ID for editing -->
              <input type="hidden" th:if="${editing}" th:field="*{id}"/>

              <div class="mb-3">
                <label for="title" class="form-label">Exam Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" th:field="*{title}"
                       placeholder="e.g., Data Structures Midterm" required/>
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}"
                          rows="3" placeholder="Brief description of the exam"></textarea>
              </div>

              <div class="mb-3">
                <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="subject" th:field="*{subject}"
                       placeholder="e.g., Computer Science" required/>
              </div>

              <div class="row">
                <div class="col-md-4 mb-3">
                  <label for="durationMinutes" class="form-label">Duration (min) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="durationMinutes"
                         th:field="*{durationMinutes}" min="1" max="300" placeholder="60" required/>
                </div>
                <div class="col-md-4 mb-3">
                  <label for="totalMarks" class="form-label">Total Marks <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="totalMarks"
                         th:field="*{totalMarks}" min="1" placeholder="100" required/>
                </div>
                <div class="col-md-4 mb-3">
                  <label for="passingPercentage" class="form-label">Passing % <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="passingPercentage"
                         th:field="*{passingPercentage}" min="0" max="100" step="0.1" placeholder="40" required/>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="startTime" class="form-label">Start Time <span class="text-danger">*</span></label>
                  <input type="datetime-local" class="form-control" id="startTime"
                         th:field="*{startTime}" required/>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="endTime" class="form-label">End Time <span class="text-danger">*</span></label>
                  <input type="datetime-local" class="form-control" id="endTime"
                         th:field="*{endTime}" required/>
                </div>
              </div>

              <div class="mb-4">
                <label for="maxWarnings" class="form-label">Max Tab-Switch Warnings</label>
                <input type="number" class="form-control" id="maxWarnings"
                       th:field="*{maxWarnings}" min="1" max="10" placeholder="3"/>
                <small class="form-text">Number of warnings before auto-submission (default: 3).</small>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="bi bi-check-lg me-1"></i>
                  <span th:text="${editing ? 'Update Exam' : 'Create Exam'}">Save</span>
                </button>
                <a th:href="@{/admin/exams}" class="btn btn-outline-secondary px-4">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
