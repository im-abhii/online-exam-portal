<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${editing ? 'Edit Question' : 'Add Question'}">Add Question</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/admin/exams}">Exams</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/admin/exam/{id}/questions(id=${examId})}">Questions</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${editing ? 'Edit Question' : 'Add Question'}">Add</li>
                    </ol>
                </nav>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom py-3">
                        <h4 class="mb-0" th:text="${editing ? 'Edit Question' : 'Add New Question'}">Add Question</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/exam/{examId}/question/save(examId=${examId})}" method="post" th:object="${question}">
                            <input type="hidden" th:if="${editing}" th:field="*{id}" />

                            <div class="mb-4">
                                <label for="questionText" class="form-label fw-medium">Question Text <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="questionText" th:field="*{questionText}" rows="4" required></textarea>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="optionA" class="form-label fw-medium">Option A <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="optionA" th:field="*{optionA}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="optionB" class="form-label fw-medium">Option B <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="optionB" th:field="*{optionB}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="optionC" class="form-label fw-medium">Option C <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="optionC" th:field="*{optionC}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="optionD" class="form-label fw-medium">Option D <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="optionD" th:field="*{optionD}" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label for="correctOption" class="form-label fw-medium">Correct Option <span class="text-danger">*</span></label>
                                    <select class="form-select" id="correctOption" th:field="*{correctOption}" required>
                                        <option value="A">Option A</option>
                                        <option value="B">Option B</option>
                                        <option value="C">Option C</option>
                                        <option value="D">Option D</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="marks" class="form-label fw-medium">Marks <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="marks" th:field="*{marks}" min="1" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="difficulty" class="form-label fw-medium">Difficulty</label>
                                    <select class="form-select" id="difficulty" th:field="*{difficulty}">
                                        <option value="EASY">Easy</option>
                                        <option value="MEDIUM">Medium</option>
                                        <option value="HARD">Hard</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="topic" class="form-label fw-medium">Topic (Optional)</label>
                                <input type="text" class="form-control" id="topic" th:field="*{topic}" placeholder="e.g. Core Java">
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a th:href="@{/admin/exam/{id}/questions(id=${examId})}" class="btn btn-light">Cancel</a>
                                <button type="submit" class="btn btn-primary">Save Question</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
