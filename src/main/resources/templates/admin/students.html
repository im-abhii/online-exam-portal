<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Manage Students - ExamPortal</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Manage Students</h2>
            <form th:action="@{/admin/students}" method="get" class="d-flex" style="width: 300px;">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search students..." name="search" th:value="${search}">
                    <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="ps-4">Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Phone</th>
                                <th scope="col">College</th>
                                <th scope="col">Status</th>
                                <th scope="col" class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${students.empty}">
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <i class="bi bi-people fs-2 d-block mb-2"></i>
                                    No students found.
                                </td>
                            </tr>
                            <tr th:each="student : ${students}">
                                <td class="ps-4 fw-medium" th:text="${student.firstName + ' ' + student.lastName}">John Doe</td>
                                <td th:text="${student.email}">john@example.com</td>
                                <td th:text="${student.phone != null ? student.phone : '-'}">1234567890</td>
                                <td th:text="${student.college != null ? student.college : '-'}">University</td>
                                <td>
                                    <span class="badge" th:classappend="${student.enabled ? 'bg-success' : 'bg-danger'}" 
                                          th:text="${student.enabled ? 'Active' : 'Disabled'}">Active</span>
                                </td>
                                <td class="text-end pe-4">
                                    <form th:action="@{/admin/student/toggle/{id}(id=${student.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm" th:classappend="${student.enabled ? 'btn-outline-danger' : 'btn-outline-success'}">
                                            <i class="bi" th:classappend="${student.enabled ? 'bi-lock' : 'bi-unlock'}"></i>
                                            <span th:text="${student.enabled ? 'Disable' : 'Enable'}">Disable</span>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
