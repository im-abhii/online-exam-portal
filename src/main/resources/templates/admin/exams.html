<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Manage Exams — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="page-title mb-0">Manage Exams</h1>
        <p class="page-subtitle mb-0">Create, edit, and publish examinations.</p>
      </div>
      <a th:href="@{/admin/exam/new}" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Create New Exam
      </a>
    </div>

    <!-- Success/Error Messages -->
    <div th:if="${success}" class="alert alert-success">
      <i class="bi bi-check-circle me-1"></i>
      <span th:text="${success}">Success</span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
      <i class="bi bi-exclamation-circle me-1"></i>
      <span th:text="${error}">Error</span>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <div th:if="${exams == null || exams.isEmpty()}" class="empty-state">
          <i class="bi bi-journal-x"></i>
          <p>No exams created yet. Click "Create New Exam" to get started.</p>
        </div>
        <div class="table-responsive" th:if="${exams != null && !exams.isEmpty()}">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Subject</th>
                <th>Duration</th>
                <th>Questions</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="exam, iterStat : ${exams}">
                <td th:text="${iterStat.count}">1</td>
                <td class="fw-semibold" th:text="${exam.title}">Exam Title</td>
                <td th:text="${exam.subject}">Subject</td>
                <td>
                  <span th:text="${exam.durationMinutes}">60</span> min
                </td>
                <td>
                  <span th:text="${exam.questions != null ? exam.questions.size() : 0}">0</span>
                </td>
                <td>
                  <span th:if="${exam.published}" class="badge badge-published">Published</span>
                  <span th:unless="${exam.published}" class="badge badge-draft">Draft</span>
                </td>
                <td class="text-end">
                  <div class="d-inline-flex gap-1">
                    <a th:href="@{/admin/exam/edit/{id}(id=${exam.id})}"
                       class="btn btn-sm btn-outline-primary" title="Edit">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/admin/exam/{id}/questions(id=${exam.id})}"
                       class="btn btn-sm btn-outline-secondary" title="Questions">
                      <i class="bi bi-list-ol"></i>
                    </a>
                    <form th:action="@{/admin/exam/toggle-publish/{id}(id=${exam.id})}" method="post" class="d-inline">
                      <button type="submit" class="btn btn-sm"
                              th:classappend="${exam.published} ? 'btn-outline-warning' : 'btn-outline-success'"
                              th:title="${exam.published} ? 'Unpublish' : 'Publish'">
                        <i class="bi" th:classappend="${exam.published} ? 'bi-eye-slash' : 'bi-eye'"></i>
                      </button>
                    </form>
                    <form th:action="@{/admin/exam/delete/{id}(id=${exam.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Are you sure you want to delete this exam? This action cannot be undone.');">
                      <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                        <i class="bi bi-trash"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
