<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Admin Dashboard — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="mb-4">
      <h1 class="page-title">Admin Dashboard</h1>
      <p class="page-subtitle">Overview of the examination portal.</p>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-lg-3">
        <div class="card stat-card blue">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon blue">
              <i class="bi bi-people"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${totalStudents != null ? totalStudents : 0}">0</div>
              <div class="stat-label">Total Students</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-3">
        <div class="card stat-card green">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon green">
              <i class="bi bi-journal-bookmark"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${totalExams != null ? totalExams : 0}">0</div>
              <div class="stat-label">Total Exams</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-3">
        <div class="card stat-card amber">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon amber">
              <i class="bi bi-pencil-square"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${completedAttempts != null ? completedAttempts : 0}">0</div>
              <div class="stat-label">Exams Taken</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-3">
        <div class="card stat-card purple">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon purple">
              <i class="bi bi-trophy"></i>
            </div>
            <div>
              <div class="stat-value" th:text="${passRate != null ? #numbers.formatDecimal(passRate, 1, 1) + '%' : '0%'}">0%</div>
              <div class="stat-label">Pass Rate</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <i class="bi bi-pie-chart me-2"></i>Pass / Fail Distribution
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="passFailChart"></canvas>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <i class="bi bi-bar-chart me-2"></i>Average Score Overview
          </div>
          <div class="card-body">
            <div class="chart-container">
              <canvas id="scoreChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="row g-3">
      <div class="col-md-4">
        <a th:href="@{/admin/exams}" class="text-decoration-none">
          <div class="card text-center py-4">
            <div class="card-body">
              <i class="bi bi-journal-text" style="font-size:2rem;color:#2563eb;"></i>
              <h6 class="mt-2 mb-0 text-dark">Manage Exams</h6>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-4">
        <a th:href="@{/admin/students}" class="text-decoration-none">
          <div class="card text-center py-4">
            <div class="card-body">
              <i class="bi bi-people" style="font-size:2rem;color:#16a34a;"></i>
              <h6 class="mt-2 mb-0 text-dark">Manage Students</h6>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-4">
        <a th:href="@{/admin/results}" class="text-decoration-none">
          <div class="card text-center py-4">
            <div class="card-body">
              <i class="bi bi-clipboard-data" style="font-size:2rem;color:#d97706;"></i>
              <h6 class="mt-2 mb-0 text-dark">View Results</h6>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
  (function () {
    const passRate = [[${passRate != null ? passRate : 0}]];
    const failRate = Math.max(0, 100 - passRate);
    const avgScore = [[${averageScore != null ? averageScore : 0}]];
    const totalStudents = [[${totalStudents != null ? totalStudents : 0}]];
    const totalExams = [[${totalExams != null ? totalExams : 0}]];
    const completedAttempts = [[${completedAttempts != null ? completedAttempts : 0}]];

    // Pass/Fail Donut Chart
    const pfCtx = document.getElementById('passFailChart');
    if (pfCtx) {
      new Chart(pfCtx, {
        type: 'doughnut',
        data: {
          labels: ['Passed', 'Failed'],
          datasets: [{
            data: [passRate, failRate],
            backgroundColor: ['#16a34a', '#ef4444'],
            borderWidth: 0,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '65%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: { family: 'Inter', size: 12 },
                padding: 16,
                usePointStyle: true,
                pointStyleWidth: 10
              }
            }
          }
        }
      });
    }

    // Score Overview Bar Chart
    const sCtx = document.getElementById('scoreChart');
    if (sCtx) {
      new Chart(sCtx, {
        type: 'bar',
        data: {
          labels: ['Total Students', 'Total Exams', 'Exams Taken', 'Avg Score %'],
          datasets: [{
            label: 'Portal Statistics',
            data: [totalStudents, totalExams, completedAttempts, avgScore],
            backgroundColor: ['#2563eb', '#16a34a', '#d97706', '#7c3aed'],
            borderRadius: 6,
            barPercentage: 0.6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#f1f5f9' },
              ticks: { font: { family: 'Inter', size: 11 } }
            },
            x: {
              grid: { display: false },
              ticks: { font: { family: 'Inter', size: 11 } }
            }
          }
        }
      });
    }
  })();
</script>
</body>
</html>
