<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - ExamPortal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
        }
        .error-card {
            max-width: 500px;
            width: 100%;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background: white;
            text-align: center;
        }
        .error-icon {
            font-size: 5rem;
            color: #dc2626;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="error-page">
        <div class="error-card">
            <i class="bi bi-exclamation-triangle-fill error-icon"></i>
            <h1 class="display-1 fw-bold text-dark mb-2" th:text="${errorCode ?: '500'}">500</h1>
            <h4 class="mb-4 text-muted" th:text="${errorMessage ?: 'Oops! Something went wrong.'}">Something went wrong.</h4>
            <p class="text-secondary mb-4">We're sorry for the inconvenience. Please try going back to the home page.</p>
            <a th:href="@{/}" class="btn btn-primary px-4 py-2 fw-medium">
                <i class="bi bi-house-door me-2"></i>Return to Home
            </a>
        </div>
    </div>

</body>
</html>
