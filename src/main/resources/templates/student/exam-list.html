<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Available Exams — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="mb-4">
      <h1 class="page-title">Available Exams</h1>
      <p class="page-subtitle">Browse and take exams assigned to you.</p>
    </div>

    <div th:if="${exams == null || exams.isEmpty()}" class="empty-state">
      <i class="bi bi-journal-x"></i>
      <p>No exams are available at this time. Check back later.</p>
    </div>

    <div class="row g-3" th:if="${exams != null && !exams.isEmpty()}">
      <div class="col-md-6 col-lg-4" th:each="exam : ${exams}">
        <div class="card exam-card h-100">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title mb-0" th:text="${exam.title}">Exam Title</h5>
              <span th:if="${attemptedExamIds != null && attemptedExamIds.contains(exam.id)}"
                    class="badge badge-attempted ms-2" style="white-space:nowrap;">
                Attempted
              </span>
            </div>
            <p class="exam-meta mb-1">
              <i class="bi bi-bookmark"></i>
              <span th:text="${exam.subject}">Subject</span>
            </p>
            <p class="exam-meta mb-1">
              <i class="bi bi-clock"></i>
              <span th:text="${exam.durationMinutes}">60</span> minutes
            </p>
            <p class="exam-meta mb-1">
              <i class="bi bi-star"></i>
              Total Marks: <span th:text="${exam.totalMarks}">100</span>
            </p>
            <p class="exam-meta mb-1">
              <i class="bi bi-percent"></i>
              Passing: <span th:text="${exam.passingPercentage}">40</span>%
            </p>
            <p class="exam-meta mb-1">
              <i class="bi bi-calendar-event"></i>
              <span th:text="${#temporals.format(exam.startTime, 'dd MMM yyyy, hh:mm a')}">Start</span>
            </p>
            <p class="exam-meta mb-3">
              <i class="bi bi-calendar-check"></i>
              <span th:text="${#temporals.format(exam.endTime, 'dd MMM yyyy, hh:mm a')}">End</span>
            </p>

            <div class="mt-auto">
              <span th:if="${attemptedExamIds != null && attemptedExamIds.contains(exam.id)}"
                    class="btn btn-sm btn-outline-secondary w-100 disabled">
                <i class="bi bi-check2-circle me-1"></i>Already Attempted
              </span>
              <a th:unless="${attemptedExamIds != null && attemptedExamIds.contains(exam.id)}"
                 th:href="@{/exam/instructions/{id}(id=${exam.id})}"
                 class="btn btn-sm btn-primary w-100">
                <i class="bi bi-file-earmark-text me-1"></i>View Instructions
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
