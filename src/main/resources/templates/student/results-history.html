<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Results History — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="mb-4">
      <h1 class="page-title">Results History</h1>
      <p class="page-subtitle">View all your completed exam results.</p>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <div th:if="${attempts == null || attempts.isEmpty()}" class="empty-state">
          <i class="bi bi-clipboard-x"></i>
          <p>No results found. Complete an exam to see your results here.</p>
        </div>
        <div class="table-responsive" th:if="${attempts != null && !attempts.isEmpty()}">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Exam Title</th>
                <th>Score</th>
                <th>Percentage</th>
                <th>Status</th>
                <th>Date</th>
                <th class="text-end">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="attempt, iterStat : ${attempts}">
                <td th:text="${iterStat.count}">1</td>
                <td class="fw-semibold" th:text="${attempt.exam.title}">Exam Title</td>
                <td>
                  <span th:text="${attempt.score}">0</span> /
                  <span th:text="${attempt.totalMarks}">100</span>
                </td>
                <td>
                  <span th:text="${#numbers.formatDecimal(attempt.percentage, 1, 1)}">0.0</span>%
                </td>
                <td>
                  <span th:if="${attempt.passed}" class="badge badge-pass">
                    <i class="bi bi-check-circle me-1"></i>Passed
                  </span>
                  <span th:unless="${attempt.passed}" class="badge badge-fail">
                    <i class="bi bi-x-circle me-1"></i>Failed
                  </span>
                </td>
                <td th:text="${#temporals.format(attempt.endTime, 'dd MMM yyyy, hh:mm a')}">01 Jan 2026</td>
                <td class="text-end">
                  <a th:href="@{/exam/result/{id}(id=${attempt.id})}"
                     class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-eye me-1"></i>View
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
