<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Exam Result — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <!-- Back Link -->
        <div class="mb-3">
          <a th:href="@{/student/results}" class="text-muted" style="font-size:0.875rem;">
            <i class="bi bi-arrow-left me-1"></i>Back to Results
          </a>
        </div>

        <!-- Result Card -->
        <div class="card">
          <div class="card-body text-center py-4">
            <h4 class="mb-1" th:text="${exam.title}">Exam Title</h4>
            <p class="text-muted mb-4" th:text="${exam.subject}">Subject</p>

            <!-- Pass/Fail Badge -->
            <div th:if="${attempt.passed}" class="mb-3">
              <span style="font-size:4rem;color:#16a34a;"><i class="bi bi-check-circle-fill"></i></span>
              <h3 class="mt-2" style="color:#16a34a;">Passed</h3>
            </div>
            <div th:unless="${attempt.passed}" class="mb-3">
              <span style="font-size:4rem;color:#dc2626;"><i class="bi bi-x-circle-fill"></i></span>
              <h3 class="mt-2" style="color:#dc2626;">Failed</h3>
            </div>

            <!-- Score Display -->
            <div class="mb-4">
              <span class="result-score" th:classappend="${attempt.passed} ? 'pass' : 'fail'"
                    th:text="${#numbers.formatDecimal(attempt.percentage, 1, 1) + '%'}">75.0%</span>
            </div>
          </div>

          <!-- Stats Grid -->
          <div class="card-body border-top">
            <div class="row g-3">
              <div class="col-4 col-md-2">
                <div class="result-stat">
                  <div class="value" th:text="${attempt.totalQuestions}">20</div>
                  <div class="label">Total</div>
                </div>
              </div>
              <div class="col-4 col-md-2">
                <div class="result-stat">
                  <div class="value" th:text="${attempt.attempted}">15</div>
                  <div class="label">Attempted</div>
                </div>
              </div>
              <div class="col-4 col-md-2">
                <div class="result-stat">
                  <div class="value" style="color:#16a34a;" th:text="${attempt.correctAnswers}">12</div>
                  <div class="label">Correct</div>
                </div>
              </div>
              <div class="col-4 col-md-2">
                <div class="result-stat">
                  <div class="value" style="color:#dc2626;" th:text="${attempt.wrongAnswers}">3</div>
                  <div class="label">Incorrect</div>
                </div>
              </div>
              <div class="col-4 col-md-2">
                <div class="result-stat">
                  <div class="value">
                    <span th:text="${attempt.score}">24</span>/<span th:text="${attempt.totalMarks}" style="font-size:1rem;color:#64748b;">40</span>
                  </div>
                  <div class="label">Score</div>
                </div>
              </div>
              <div class="col-4 col-md-2">
                <div class="result-stat">
                  <div class="value" th:text="${#numbers.formatDecimal(attempt.percentage, 1, 1) + '%'}">60.0%</div>
                  <div class="label">Percentage</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Auto-submitted Alert -->
          <div class="card-body border-top" th:if="${attempt.autoSubmitted}">
            <div class="alert alert-info mb-0">
              <i class="bi bi-info-circle me-2"></i>
              This exam was <strong>auto-submitted</strong> due to exceeding the time limit or maximum tab-switch warnings.
            </div>
          </div>

          <!-- Actions -->
          <div class="card-body border-top text-center">
            <a th:href="@{/student/dashboard}" class="btn btn-primary px-4">
              <i class="bi bi-grid me-1"></i>Go to Dashboard
            </a>
            <a th:href="@{/student/results}" class="btn btn-outline-secondary px-4 ms-2">
              <i class="bi bi-list-ul me-1"></i>All Results
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
