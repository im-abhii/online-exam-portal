<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Change Password — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="page-content">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="mb-4">
          <h1 class="page-title">Change Password</h1>
          <p class="page-subtitle">Update your account password.</p>
        </div>

        <!-- Success Message -->
        <div th:if="${success}" class="alert alert-success">
          <i class="bi bi-check-circle me-1"></i>
          <span th:text="${success}">Password changed successfully.</span>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
          <i class="bi bi-exclamation-circle me-1"></i>
          <span th:text="${error}">Error message</span>
        </div>

        <div class="card">
          <div class="card-body">
            <form th:action="@{/student/change-password}" method="post">
              <div class="mb-3">
                <label for="currentPassword" class="form-label">Current Password</label>
                <input type="password" class="form-control" id="currentPassword"
                       name="currentPassword" placeholder="Enter current password" required/>
              </div>

              <div class="mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword"
                       name="newPassword" placeholder="Enter new password" required minlength="6"/>
              </div>

              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword"
                       name="confirmPassword" placeholder="Confirm new password" required/>
                <small class="form-text text-danger d-none" id="passwordMismatch">Passwords do not match.</small>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2" id="changeBtn">
                <i class="bi bi-key me-1"></i>Update Password
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    const newPw = document.getElementById('newPassword');
    const confirmPw = document.getElementById('confirmPassword');
    const mismatch = document.getElementById('passwordMismatch');
    const form = confirmPw.closest('form');

    confirmPw.addEventListener('input', function () {
      if (this.value && this.value !== newPw.value) {
        mismatch.classList.remove('d-none');
      } else {
        mismatch.classList.add('d-none');
      }
    });

    form.addEventListener('submit', function (e) {
      if (newPw.value !== confirmPw.value) {
        e.preventDefault();
        mismatch.classList.remove('d-none');
        confirmPw.focus();
      }
    });
  })();
</script>
</body>
</html>
