<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Register — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card register-card">
    <div class="auth-brand">
      <h1><i class="bi bi-mortarboard-fill"></i> ExamPortal</h1>
      <p>Create a new student account</p>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-danger" role="alert">
      <i class="bi bi-exclamation-circle me-1"></i>
      <span th:text="${error}">Error message</span>
    </div>

    <form th:action="@{/register}" method="post" id="registerForm">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="firstName" class="form-label">First Name</label>
          <input type="text" class="form-control" id="firstName" name="firstName"
                 placeholder="First name" required/>
        </div>
        <div class="col-md-6 mb-3">
          <label for="lastName" class="form-label">Last Name</label>
          <input type="text" class="form-control" id="lastName" name="lastName"
                 placeholder="Last name" required/>
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="Enter your email" required/>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" name="phone"
               placeholder="Phone number" required/>
      </div>

      <div class="mb-3">
        <label for="college" class="form-label">College / Institution</label>
        <input type="text" class="form-control" id="college" name="college"
               placeholder="College name" required/>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Create a password" required minlength="6"/>
        <div class="password-strength mt-1">
          <div class="bar" id="strengthBar"></div>
        </div>
        <small class="form-text" id="strengthText"></small>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
               placeholder="Confirm your password" required/>
        <small class="form-text text-danger d-none" id="passwordMismatch">Passwords do not match.</small>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2" id="registerBtn">
        <i class="bi bi-person-plus me-1"></i>Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const mismatchEl = document.getElementById('passwordMismatch');
    const form = document.getElementById('registerForm');

    passwordInput.addEventListener('input', function () {
      const val = this.value;
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/\d/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      strengthBar.className = 'bar';
      if (val.length === 0) {
        strengthBar.style.width = '0';
        strengthText.textContent = '';
      } else if (score <= 2) {
        strengthBar.classList.add('weak');
        strengthText.textContent = 'Weak password';
        strengthText.style.color = '#dc2626';
      } else if (score <= 3) {
        strengthBar.classList.add('medium');
        strengthText.textContent = 'Moderate password';
        strengthText.style.color = '#d97706';
      } else {
        strengthBar.classList.add('strong');
        strengthText.textContent = 'Strong password';
        strengthText.style.color = '#16a34a';
      }
    });

    confirmInput.addEventListener('input', function () {
      if (this.value && this.value !== passwordInput.value) {
        mismatchEl.classList.remove('d-none');
      } else {
        mismatchEl.classList.add('d-none');
      }
    });

    form.addEventListener('submit', function (e) {
      if (passwordInput.value !== confirmInput.value) {
        e.preventDefault();
        mismatchEl.classList.remove('d-none');
        confirmInput.focus();
      }
    });
  })();
</script>
</body>
</html>
