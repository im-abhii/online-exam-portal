<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Login — ExamPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <h1><i class="bi bi-mortarboard-fill"></i> ExamPortal</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Error Message -->
    <div th:if="${param.error}" class="alert alert-danger" role="alert">
      <i class="bi bi-exclamation-circle me-1"></i>
      Invalid email or password. Please try again.
    </div>

    <!-- Logout Success -->
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
      <i class="bi bi-check-circle me-1"></i>
      You have been logged out successfully.
    </div>

    <!-- Registration Success -->
    <div th:if="${param.registered}" class="alert alert-success" role="alert">
      <i class="bi bi-check-circle me-1"></i>
      Registration successful! Please sign in.
    </div>

    <form th:action="@{/login}" method="post">
      
      <!-- Role Selection Toggle -->
      <div class="mb-4">
        <label class="form-label d-block text-center text-muted mb-3" style="font-size: 0.9rem;">Select your role to continue</label>
        <div class="d-flex bg-light rounded-pill p-1">
          <input type="radio" class="btn-check" name="roleSelector" id="roleStudent" autocomplete="off" checked onchange="handleRoleChange('student')">
          <label class="btn btn-outline-primary border-0 rounded-pill w-50" for="roleStudent">Student</label>

          <input type="radio" class="btn-check" name="roleSelector" id="roleAdmin" autocomplete="off" onchange="handleRoleChange('admin')">
          <label class="btn btn-outline-primary border-0 rounded-pill w-50" for="roleAdmin">Admin</label>
        </div>
        <div id="adminHint" class="text-center mt-2 text-primary" style="font-size: 0.8rem; display: none; font-weight: 500;">
          <i class="bi bi-info-circle me-1"></i> Hint: admin@examportal.com / Admin@123
        </div>
      </div>
      
      <script>
        function handleRoleChange(role) {
            const hint = document.getElementById('adminHint');
            const emailInput = document.getElementById('email');
            
            if(role === 'admin') {
                hint.style.display = 'block';
                emailInput.placeholder = "e.g. admin@examportal.com";
            } else {
                hint.style.display = 'none';
                emailInput.placeholder = "Enter your email";
            }
        }
      </script>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="Enter your email" required autofocus/>
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter your password" required/>
        </div>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me"/>
        <label class="form-check-label" for="rememberMe" style="font-size:0.875rem;">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a th:href="@{/register}">Create one</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
