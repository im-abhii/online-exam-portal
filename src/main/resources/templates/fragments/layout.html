<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ============ HEADER FRAGMENT ============ -->
<header th:fragment="header">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" th:href="@{/}">
        <i class="bi bi-mortarboard-fill"></i>ExamPortal
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
              data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <!-- Student Navigation -->
        <ul class="navbar-nav me-auto" sec:authorize="hasRole('STUDENT')">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/student/dashboard}">
              <i class="bi bi-grid me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/student/exams}">
              <i class="bi bi-journal-text me-1"></i>Exams
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/student/results}">
              <i class="bi bi-bar-chart me-1"></i>Results
            </a>
          </li>
        </ul>

        <!-- Admin Navigation -->
        <ul class="navbar-nav me-auto" sec:authorize="hasRole('ADMIN')">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/dashboard}">
              <i class="bi bi-grid me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/exams}">
              <i class="bi bi-journal-text me-1"></i>Exams
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/students}">
              <i class="bi bi-people me-1"></i>Students
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/results}">
              <i class="bi bi-clipboard-data me-1"></i>Results
            </a>
          </li>
        </ul>

        <!-- Right Side: User Info & Logout -->
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item me-2" sec:authorize="isAuthenticated()">
            <span class="navbar-text">
              <i class="bi bi-person-circle me-1"></i>
              <span class="nav-user-name" sec:authentication="name">User</span>
            </span>
          </li>
          <li class="nav-item me-2" sec:authorize="hasRole('STUDENT')">
            <a class="nav-link" th:href="@{/student/change-password}">
              <i class="bi bi-key me-1"></i>Change Password
            </a>
          </li>
          <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" class="d-inline">
              <button type="submit" class="btn btn-outline-secondary btn-sm btn-logout">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
              </button>
            </form>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<!-- ============ FOOTER FRAGMENT ============ -->
<footer th:fragment="footer" class="app-footer">
  <div class="container">
    <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> ExamPortal. All rights reserved.</p>
  </div>
</footer>

</html>
